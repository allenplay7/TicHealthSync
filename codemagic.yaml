# Codemagic CI config for the TicHealthSync iOS app.
# Docs: https://docs.codemagic.io/yaml/yaml-getting-started/
#
# The default workflow ("ios-compile") just verifies the app compiles — it builds
# the iOS app unsigned, so it needs NO Apple Developer account or signing setup.
# Once compilation is green, use the "ios-device" notes at the bottom to produce a
# signed, installable .ipa.

workflows:
  ios-compile:
    name: TicHealthSync iOS (compile check, unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "ios-app/TicHealthSync.xcodeproj"
        XCODE_SCHEME: "TicHealthSync"
    triggering:
      events:
        - push
      cancel_previous_builds: true
    scripts:
      - name: Show toolchain
        script: |
          xcodebuild -version
          xcodebuild -list -project "$XCODE_PROJECT"
      - name: Build (unsigned, iOS device SDK)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app

  # Signed build that uploads to TestFlight so you can install on your iPhone.
  # REQUIRES a paid Apple Developer Program membership ($99/yr) and a one-time
  # setup in Codemagic. See ios-app/INSTALL.md for the full first-time walkthrough.
  #
  # Before this workflow can run you must:
  #   1. Add an App Store Connect API key in Codemagic
  #      (Team settings -> Integrations -> App Store Connect) and name it.
  #   2. Put that exact name after `app_store_connect:` below
  #      (replace "TicHealthSync ASC API key").
  #   3. Create the app record in App Store Connect with bundle id
  #      com.tichealthsync.ios (App Store Connect -> Apps -> +).
  ios-testflight:
    name: TicHealthSync iOS (signed -> TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: TicHealthSync ASC API key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tichealthsync.ios
      xcode: latest
      vars:
        XCODE_PROJECT: "ios-app/TicHealthSync.xcodeproj"
        XCODE_SCHEME: "TicHealthSync"
    triggering:
      events:
        - tag            # build + upload when you push a git tag (e.g. v0.1.0)
      cancel_previous_builds: true
    scripts:
      - name: Set build number from Codemagic counter
        script: |
          cd "$CM_BUILD_DIR/ios-app"
          # Avoid TestFlight "duplicate build number" rejections by stamping the
          # Codemagic build counter into the project version.
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" \
            TicHealthSync.xcodeproj/project.pbxproj
      - name: Fetch signing files
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

